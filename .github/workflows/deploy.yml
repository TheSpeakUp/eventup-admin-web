name: Deploy

# Auto on every push to main + manual override.
# CI workflow (ci.yml) runs lint/build/e2e on PRs; merges to main are gated by it.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Hard-serialize deploys: never two in flight against the same prod box.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  actions: write   # upload-artifact / download-artifact

env:
  BUNDLE_ARTIFACT: eventup-admin-web-standalone

jobs:
  build:
    name: Build standalone bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm build (emit standalone)
        run: pnpm build

      - name: stage public/ + .next/static into standalone bundle
        run: ./scripts/stage-standalone.sh

      - name: upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT }}
          path: .next/standalone
          if-no-files-found: error
          retention-days: 30
          include-hidden-files: true

  deploy:
    name: Deploy to admin-marketplace.speakup.ltd
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 8
    environment:
      name: production
      url: https://admin-marketplace.speakup.ltd
    steps:
      - uses: actions/checkout@v4

      - name: download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BUNDLE_ARTIFACT }}
          path: .next/standalone

      - name: install ssh deploy key
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: rsync + restart + smoke
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY_PATH: /home/runner/.ssh/id_deploy
          BUNDLE_DIR: .next/standalone
        run: ./scripts/deploy.sh
